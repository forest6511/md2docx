# Business Document Preset - For proposals, reports, and meeting minutes
SchemaVersion: "2.0"

Metadata:
  Name: "Business"
  Description: "Professional styling for business documents: proposals, reports, meeting minutes"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 21.0
  Height: 29.7
  MarginTop: 3.0
  MarginBottom: 3.0
  MarginLeft: 3.0
  MarginRight: 2.5

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif CJK JP"
  DefaultSize: 11

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: false
  Depth: 3

Styles:
  H1:
    Size: 24
    Bold: true
    Color: "1a5490"
    ShowBorder: false
    SpaceBefore: "960"
    SpaceAfter: "480"
  H2:
    Size: 16
    Bold: true
    Color: "2e5c8a"
    ShowBorder: true
    BorderColor: "4a90e2"
    BorderSize: 16
    BorderSpace: 2
    SpaceBefore: "360"
    SpaceAfter: "200"
  H3:
    Size: 13
    Bold: true
    Color: "34495e"
    ShowBorder: false
    SpaceBefore: "280"
    SpaceAfter: "140"
  H4:
    Size: 12
    Bold: true
    Color: "5d6d7e"
    ShowBorder: false
    SpaceBefore: "200"
    SpaceAfter: "100"
  H5:
    Size: 11
    Bold: true
    Color: "5d6d7e"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  H6:
    Size: 11
    Bold: false
    Color: "7f8c8d"
    ShowBorder: false
    SpaceBefore: "120"
    SpaceAfter: "60"
  Paragraph:
    Size: 11
    Color: "2c3e50"
    LineSpacing: "420"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 11
    Color: "2c3e50"
    LeftIndent: "720"
    HangingIndent: "360"
    SpaceBefore: "60"
    SpaceAfter: "60"
  CodeBlock:
    Size: 9
    Color: "333333"
    BackgroundColor: "f5f5f5"
    BorderColor: "dddddd"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "240"
    SpaceBefore: "200"
    SpaceAfter: "200"
    BorderSpace: 4
  Quote:
    Size: 11
    Color: "5d6d7e"
    Italic: false
    ShowBorder: true
    BorderColor: "3498db"
    BorderSize: 20
    BorderSpace: 0
    BackgroundColor: "eef2f7"
    LeftIndent: "720"
    SpaceBefore: "200"
    SpaceAfter: "200"
    PaddingSpace: 4
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
