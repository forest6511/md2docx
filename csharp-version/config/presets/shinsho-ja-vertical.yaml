# Shinsho Japanese vertical text preset (103x182mm, tategaki)
# Suitable for: compact vertical books, pocket-sized publications
# Width/Height are specified in landscape orientation (Width=182mm, Height=103mm)
# Inner margin (MarginLeft) assumes ~300-500 pages; adjust for page count
SchemaVersion: "2.0"

Metadata:
  Name: "Shinsho Japanese Vertical"
  Description: "Shinsho (103x182mm) vertical layout for compact Japanese books"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Vertical"

PageLayout:
  Width: 18.2   # physical height of Shinsho (182mm) — landscape orientation for vertical text
  Height: 10.3  # physical width of Shinsho (103mm)
  MarginTop: 1.2
  MarginBottom: 1.2
  MarginLeft: 1.27  # inner (binding) margin
  MarginRight: 0.64 # outer margin
  MarginHeader: 0.7
  MarginFooter: 0.7
  MirrorMargins: true

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif CJK JP"
  DefaultSize: 8

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: true
  Depth: 2
  PageBreakAfter: true

Styles:
  H1:
    Size: 16
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    PageBreakBefore: true
    SpaceBefore: "320"
    SpaceAfter: "160"
  H2:
    Size: 12
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    SpaceBefore: "240"
    SpaceAfter: "120"
  H3:
    Size: 10
    Bold: true
    Color: "333333"
    ShowBorder: false
    SpaceBefore: "180"
    SpaceAfter: "90"
  H4:
    Size: 9
    Bold: true
    Color: "444444"
    ShowBorder: false
    SpaceBefore: "140"
    SpaceAfter: "70"
  H5:
    Size: 8
    Bold: true
    Color: "555555"
    ShowBorder: false
    SpaceBefore: "100"
    SpaceAfter: "50"
  H6:
    Size: 8
    Bold: false
    Color: "666666"
    ShowBorder: false
    SpaceBefore: "80"
    SpaceAfter: "40"
  Paragraph:
    Size: 8
    Color: "1a1a1a"
    LineSpacing: "280"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 8
    Color: "1a1a1a"
    LeftIndent: "520"
    HangingIndent: "260"
    SpaceBefore: "30"
    SpaceAfter: "30"
  CodeBlock:
    Size: 6
    Color: "333333"
    BackgroundColor: "f5f5f5"
    BorderColor: "cccccc"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "200"
    SpaceBefore: "80"
    SpaceAfter: "80"
    BorderSpace: 4
  Quote:
    Size: 8
    Color: "555555"
    Italic: false
    ShowBorder: true
    BorderColor: "888888"
    BorderSize: 16
    BorderSpace: 0
    LeftIndent: "520"
    SpaceBefore: "80"
    SpaceAfter: "80"
  Image:
    MaxWidthPercent: 75
    Alignment: "center"
