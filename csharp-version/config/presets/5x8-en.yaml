# 5x8 inch English compact non-fiction preset (127.0x203.2mm)
# Suitable for: compact non-fiction, essays, short books
# Inner margin (MarginLeft) assumes ~300-500 pages; adjust for page count
SchemaVersion: "2.0"

Metadata:
  Name: "5x8 English Compact Non-fiction"
  Description: "5x8 inch (127.0x203.2mm) horizontal layout for compact English books"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 12.70     # 5 inches
  Height: 20.32    # 8 inches
  MarginTop: 1.27
  MarginBottom: 1.27
  MarginLeft: 1.27  # inner (binding) margin
  MarginRight: 0.64 # outer margin
  MarginHeader: 0.8
  MarginFooter: 0.8
  MirrorMargins: true

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif"
  DefaultSize: 10

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: true
  Depth: 2
  PageBreakAfter: true

Styles:
  H1:
    Size: 20
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    PageBreakBefore: true
    SpaceBefore: "400"
    SpaceAfter: "200"
  H2:
    Size: 14
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    SpaceBefore: "300"
    SpaceAfter: "150"
  H3:
    Size: 12
    Bold: true
    Color: "333333"
    ShowBorder: false
    SpaceBefore: "240"
    SpaceAfter: "120"
  H4:
    Size: 11
    Bold: true
    Color: "444444"
    ShowBorder: false
    SpaceBefore: "180"
    SpaceAfter: "90"
  H5:
    Size: 10
    Bold: true
    Color: "555555"
    ShowBorder: false
    SpaceBefore: "140"
    SpaceAfter: "70"
  H6:
    Size: 10
    Bold: false
    Color: "666666"
    ShowBorder: false
    SpaceBefore: "100"
    SpaceAfter: "50"
  Paragraph:
    Size: 10
    Color: "1a1a1a"
    LineSpacing: "320"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 10
    Color: "1a1a1a"
    LeftIndent: "640"
    HangingIndent: "320"
    SpaceBefore: "40"
    SpaceAfter: "40"
  CodeBlock:
    Size: 8
    Color: "333333"
    BackgroundColor: "f5f5f5"
    BorderColor: "cccccc"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "240"
    SpaceBefore: "140"
    SpaceAfter: "140"
    BorderSpace: 4
  Quote:
    Size: 10
    Color: "555555"
    Italic: true
    ShowBorder: true
    BorderColor: "888888"
    BorderSize: 16
    BorderSpace: 0
    LeftIndent: "640"
    SpaceBefore: "140"
    SpaceAfter: "140"
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
