# B5 Japanese textbook/reference preset (182x257mm)
# Suitable for: textbooks, reference books, academic publications
# Inner margin (MarginLeft) assumes ~300-500 pages; adjust for page count
SchemaVersion: "2.0"

Metadata:
  Name: "B5 Japanese Textbook"
  Description: "B5 (182x257mm) horizontal layout for Japanese textbooks and reference books"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 18.2
  Height: 25.7
  MarginTop: 2.0
  MarginBottom: 2.0
  MarginLeft: 1.91  # inner (binding) margin
  MarginRight: 0.64 # outer margin
  MarginHeader: 1.0
  MarginFooter: 1.0
  MirrorMargins: true

Fonts:
  Ascii: "Noto Sans"
  EastAsia: "Noto Sans CJK JP"
  DefaultSize: 10

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: true
  Depth: 3
  PageBreakAfter: true

Styles:
  H1:
    Size: 22
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    PageBreakBefore: true
    SpaceBefore: "500"
    SpaceAfter: "250"
  H2:
    Size: 16
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    SpaceBefore: "360"
    SpaceAfter: "180"
  H3:
    Size: 13
    Bold: true
    Color: "333333"
    ShowBorder: false
    SpaceBefore: "280"
    SpaceAfter: "140"
  H4:
    Size: 11
    Bold: true
    Color: "444444"
    ShowBorder: false
    SpaceBefore: "200"
    SpaceAfter: "100"
  H5:
    Size: 10
    Bold: true
    Color: "555555"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  H6:
    Size: 10
    Bold: false
    Color: "666666"
    ShowBorder: false
    SpaceBefore: "120"
    SpaceAfter: "60"
  Paragraph:
    Size: 10
    Color: "1a1a1a"
    LineSpacing: "320"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 10
    Color: "1a1a1a"
    LeftIndent: "720"
    HangingIndent: "360"
    SpaceBefore: "50"
    SpaceAfter: "50"
  CodeBlock:
    Size: 8
    Color: "333333"
    BackgroundColor: "f5f5f5"
    BorderColor: "cccccc"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "250"
    SpaceBefore: "140"
    SpaceAfter: "140"
    BorderSpace: 4
  Quote:
    Size: 10
    Color: "555555"
    Italic: false
    ShowBorder: true
    BorderColor: "888888"
    BorderSize: 16
    BorderSpace: 0
    LeftIndent: "720"
    SpaceBefore: "140"
    SpaceAfter: "140"
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
