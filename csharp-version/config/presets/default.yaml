    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "280"
    SpaceBefore: "160"
    SpaceAfter: "160"
    BorderSpace: 4
  Quote:
    Size: 11
    Color: "7f8c8d"
    Italic: true
    ShowBorder: true
    BorderColor: "3498db"
    BorderSize: 24
    BorderSpace: 0
    LeftIndent: "720"
    SpaceBefore: "160"
    SpaceAfter: "160"
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
