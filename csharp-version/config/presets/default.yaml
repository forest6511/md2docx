# Default Preset - Balanced general-purpose Markdown to Word conversion
SchemaVersion: "2.0"

Metadata:
  Name: "Default"
  Description: "Balanced settings for general-purpose Markdown to Word conversion"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 21.0
  Height: 29.7
  MarginTop: 2.5
  MarginBottom: 2.5
  MarginLeft: 2.5
  MarginRight: 2.5

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif CJK JP"
  DefaultSize: 11

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: false
  Depth: 3

Styles:
  H1:
    Size: 20
    Bold: true
    Color: "2c3e50"
    ShowBorder: true
    BorderColor: "3498db"
    BorderSize: 24
    BorderSpace: 4
    SpaceBefore: "360"
    SpaceAfter: "240"
  H2:
    Size: 16
    Bold: true
    Color: "34495e"
    ShowBorder: false
    SpaceBefore: "280"
    SpaceAfter: "160"
  H3:
    Size: 14
    Bold: true
    Color: "5d6d7e"
    ShowBorder: false
    SpaceBefore: "240"
    SpaceAfter: "120"
  H4:
    Size: 12
    Bold: true
    Color: "7f8c8d"
    ShowBorder: false
    SpaceBefore: "200"
    SpaceAfter: "100"
  H5:
    Size: 11
    Bold: true
    Color: "7f8c8d"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  H6:
    Size: 11
    Bold: false
    Color: "95a5a6"
    ShowBorder: false
    SpaceBefore: "120"
    SpaceAfter: "60"
  Paragraph:
    Size: 11
    Color: "2c3e50"
    LineSpacing: "360"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 11
    Color: "2c3e50"
    LeftIndent: "720"
    HangingIndent: "360"
