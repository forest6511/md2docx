# Minimal Preset - Clean, minimal styling for simple documents and quick conversions
SchemaVersion: "2.0"

Metadata:
  Name: "Minimal"
  Description: "Clean minimal styling for simple documents and quick conversions"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 21.0
  Height: 29.7
  MarginTop: 2.54
  MarginBottom: 2.54
  MarginLeft: 2.54
  MarginRight: 2.54

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif CJK JP"
  DefaultSize: 10

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: false
  Depth: 3

Styles:
  H1:
    Size: 18
    Bold: true
    Color: "000000"
    ShowBorder: false
    SpaceBefore: "240"
    SpaceAfter: "120"
  H2:
    Size: 16
    Bold: true
    Color: "000000"
    ShowBorder: false
    SpaceBefore: "240"
    SpaceAfter: "120"
  H3:
    Size: 14
    Bold: true
    Color: "000000"
    ShowBorder: false
    SpaceBefore: "200"
    SpaceAfter: "100"
  H4:
    Size: 12
    Bold: true
    Color: "000000"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  H5:
    Size: 11
    Bold: true
    Color: "000000"
    ShowBorder: false
    SpaceBefore: "120"
    SpaceAfter: "60"
  H6:
    Size: 11
    Bold: true
    Color: "000000"
    ShowBorder: false
    SpaceBefore: "100"
    SpaceAfter: "40"
  Paragraph:
    Size: 10
    Color: "000000"
    LineSpacing: "300"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 10
    Color: "000000"
    LeftIndent: "720"
    HangingIndent: "360"
    SpaceBefore: "40"
    SpaceAfter: "40"
  CodeBlock:
    Size: 9
    Color: "333333"
    BackgroundColor: "f0f0f0"
    BorderColor: "cccccc"
    MonospaceFontAscii: "Courier New"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "240"
    SpaceBefore: "120"
    SpaceAfter: "120"
    BorderSpace: 4
  Quote:
    Size: 10
    Color: "555555"
    Italic: true
    ShowBorder: true
    BorderColor: "cccccc"
    BorderSize: 16
    BorderSpace: 0
    LeftIndent: "720"
    SpaceBefore: "120"
    SpaceAfter: "120"
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
