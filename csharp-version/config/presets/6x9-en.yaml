# 6x9 inch English non-fiction preset (152.4x228.6mm)
# Suitable for: non-fiction, tech, business books
# Inner margin (MarginLeft) assumes ~300-500 pages; increase for thicker books
SchemaVersion: "2.0"

Metadata:
  Name: "6x9 English Non-fiction"
  Description: "6x9 inch (152.4x228.6mm) horizontal layout for English non-fiction books"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 15.24     # 6 inches
  Height: 22.86    # 9 inches
  MarginTop: 1.91
  MarginBottom: 1.91
  MarginLeft: 1.59  # inner (binding) margin
  MarginRight: 0.64 # outer margin
  MarginHeader: 1.0
  MarginFooter: 1.0
  MirrorMargins: true

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif"
  DefaultSize: 11

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: true
  Depth: 2
  PageBreakAfter: true

Styles:
  H1:
    Size: 22
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    PageBreakBefore: true
    SpaceBefore: "480"
    SpaceAfter: "240"
  H2:
    Size: 16
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    SpaceBefore: "360"
    SpaceAfter: "180"
  H3:
    Size: 13
    Bold: true
    Color: "333333"
    ShowBorder: false
    SpaceBefore: "280"
    SpaceAfter: "140"
  H4:
    Size: 12
    Bold: true
    Color: "444444"
    ShowBorder: false
    SpaceBefore: "200"
    SpaceAfter: "100"
  H5:
    Size: 11
    Bold: true
    Color: "555555"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  H6:
    Size: 11
    Bold: false
    Color: "666666"
    ShowBorder: false
    SpaceBefore: "120"
    SpaceAfter: "60"
  Paragraph:
    Size: 11
    Color: "1a1a1a"
    LineSpacing: "340"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 11
    Color: "1a1a1a"
    LeftIndent: "720"
    HangingIndent: "360"
    SpaceBefore: "40"
    SpaceAfter: "40"
  CodeBlock:
    Size: 9
    Color: "333333"
    BackgroundColor: "f5f5f5"
    BorderColor: "cccccc"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "260"
    SpaceBefore: "160"
    SpaceAfter: "160"
    BorderSpace: 4
  Quote:
    Size: 11
    Color: "555555"
    Italic: true
    ShowBorder: true
    BorderColor: "888888"
    BorderSize: 16
    BorderSpace: 0
    LeftIndent: "720"
    SpaceBefore: "160"
    SpaceAfter: "160"
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
