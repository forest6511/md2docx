# Technical Documentation Preset - For API docs, manuals, README files
SchemaVersion: "2.0"

Metadata:
  Name: "Technical"
  Description: "Technical documentation with code-heavy formatting, GitHub-inspired styling"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Horizontal"

PageLayout:
  Width: 21.0
  Height: 29.7
  MarginTop: 2.5
  MarginBottom: 2.5
  MarginLeft: 2.5
  MarginRight: 2.5

Fonts:
  Ascii: "Noto Sans"
  EastAsia: "Noto Sans CJK JP"
  DefaultSize: 10

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: true
  Depth: 3
  Title: "Table of Contents"
  PageBreakAfter: true

Styles:
  H1:
    Size: 22
    Bold: true
    Color: "0366d6"
    ShowBorder: true
    BorderColor: "0366d6"
    BorderSize: 24
    BorderSpace: 4
    SpaceBefore: "0"
    SpaceAfter: "320"
    PageBreakBefore: false
  H2:
    Size: 18
    Bold: true
    Color: "24292e"
    ShowBorder: false
    SpaceBefore: "400"
    SpaceAfter: "200"
    PageBreakBefore: false
  H3:
    Size: 15
    Bold: true
    Color: "586069"
    ShowBorder: false
    SpaceBefore: "320"
    SpaceAfter: "160"
  H4:
    Size: 13
    Bold: true
    Color: "6f42c1"
    ShowBorder: false
    SpaceBefore: "240"
    SpaceAfter: "120"
  H5:
    Size: 11
    Bold: true
    Color: "24292e"
    ShowBorder: false
    SpaceBefore: "200"
    SpaceAfter: "100"
  H6:
    Size: 10
    Bold: true
    Color: "6a737d"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  Paragraph:
    Size: 10
    Color: "24292e"
    LineSpacing: "384"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 10
    Color: "24292e"
    LeftIndent: "720"
    HangingIndent: "360"
    SpaceBefore: "40"
    SpaceAfter: "40"
  CodeBlock:
    Size: 9
    Color: "24292e"
    BackgroundColor: "f6f8fa"
    BorderColor: "d1d5da"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "280"
    SpaceBefore: "200"
    SpaceAfter: "200"
    BorderSpace: 5
  Quote:
    Size: 10
    Color: "6a737d"
    Italic: false
    ShowBorder: true
    BorderColor: "dfe2e5"
    BorderSize: 20
    BorderSpace: 0
    LeftIndent: "720"
    SpaceBefore: "160"
    SpaceAfter: "160"
  Image:
    MaxWidthPercent: 90
    Alignment: "center"
