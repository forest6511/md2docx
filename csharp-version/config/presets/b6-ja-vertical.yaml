# B6 Japanese vertical text preset (128x182mm, tategaki)
# Suitable for: novels, fiction, literary essays
# Width/Height are specified in landscape orientation (Width=182mm, Height=128mm)
# Inner margin (MarginLeft) assumes ~300-500 pages; adjust for page count
SchemaVersion: "2.0"

Metadata:
  Name: "B6 Japanese Vertical Novel"
  Description: "B6 (128x182mm) vertical layout for Japanese novels and fiction"
  Author: "md2docx"
  Version: "1.0.0"

TextDirection: "Vertical"

PageLayout:
  Width: 18.2   # physical height of B6 (182mm) — landscape orientation for vertical text
  Height: 12.8  # physical width of B6 (128mm)
  MarginTop: 1.5
  MarginBottom: 1.5
  MarginLeft: 1.27  # inner (binding) margin
  MarginRight: 0.64 # outer margin
  MarginHeader: 0.8
  MarginFooter: 0.8
  MirrorMargins: true

Fonts:
  Ascii: "Noto Serif"
  EastAsia: "Noto Serif CJK JP"
  DefaultSize: 9

TitlePage:
  Enabled: false
  PageBreakAfter: true

TableOfContents:
  Enabled: true
  Depth: 2
  PageBreakAfter: true

Styles:
  H1:
    Size: 18
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    PageBreakBefore: true
    SpaceBefore: "360"
    SpaceAfter: "180"
  H2:
    Size: 14
    Bold: true
    Color: "1a1a1a"
    ShowBorder: false
    SpaceBefore: "280"
    SpaceAfter: "140"
  H3:
    Size: 11
    Bold: true
    Color: "333333"
    ShowBorder: false
    SpaceBefore: "220"
    SpaceAfter: "110"
  H4:
    Size: 10
    Bold: true
    Color: "444444"
    ShowBorder: false
    SpaceBefore: "160"
    SpaceAfter: "80"
  H5:
    Size: 9
    Bold: true
    Color: "555555"
    ShowBorder: false
    SpaceBefore: "120"
    SpaceAfter: "60"
  H6:
    Size: 9
    Bold: false
    Color: "666666"
    ShowBorder: false
    SpaceBefore: "100"
    SpaceAfter: "50"
  Paragraph:
    Size: 9
    Color: "1a1a1a"
    LineSpacing: "300"
    FirstLineIndent: "0"
    LeftIndent: "0"
  List:
    Size: 9
    Color: "1a1a1a"
    LeftIndent: "580"
    HangingIndent: "290"
    SpaceBefore: "30"
    SpaceAfter: "30"
  CodeBlock:
    Size: 7
    Color: "333333"
    BackgroundColor: "f5f5f5"
    BorderColor: "cccccc"
    MonospaceFontAscii: "Consolas"
    MonospaceFontEastAsia: "Noto Sans Mono CJK JP"
    LineSpacing: "220"
    SpaceBefore: "100"
    SpaceAfter: "100"
    BorderSpace: 4
  Quote:
    Size: 9
    Color: "555555"
    Italic: false
    ShowBorder: true
    BorderColor: "888888"
    BorderSize: 16
    BorderSpace: 0
    LeftIndent: "580"
    SpaceBefore: "100"
    SpaceAfter: "100"
  Image:
    MaxWidthPercent: 80
    Alignment: "center"
